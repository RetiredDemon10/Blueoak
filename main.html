<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance – Blueoak </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50%       { transform: translateY(-18px) rotate(2deg); }
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes bar {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 78%; }
    }
  </style>
</head>
<body style="
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #06090f;
  font-family: 'DM Sans', sans-serif;
  color: #e2e8f0;
  overflow: hidden;
  position: relative;
">

  <!-- Background grid -->
  <div style="
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  "></div>

  <!-- Glow blobs -->
  <div style="
    position: fixed; top: -120px; left: -120px;
    width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%);
    z-index: 0; pointer-events: none;
  "></div>
  <div style="
    position: fixed; bottom: -100px; right: -100px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
    z-index: 0; pointer-events: none;
  "></div>

  <!-- Card -->
  <div style="
    position: relative; z-index: 10;
    width: 100%; max-width: 580px;
    margin: 24px;
    background: rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    overflow: hidden;
    animation: fadeUp 0.7s ease both;
  ">

    <!-- Top accent bar -->
    <div style="
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
    "></div>

    <div style="padding: 52px 48px 44px; text-align: center;">

      <!-- Floating gear icon -->
      <div style="position: relative; display: inline-block; margin-bottom: 36px;">
        <!-- Pulse rings -->
        <div style="
          position: absolute; inset: -8px; border-radius: 50%;
          border: 2px solid rgba(59,130,246,0.5);
          animation: pulse-ring 2s ease-out infinite;
        "></div>
        <div style="
          position: absolute; inset: -8px; border-radius: 50%;
          border: 2px solid rgba(139,92,246,0.4);
          animation: pulse-ring 2s ease-out 0.6s infinite;
        "></div>

        <!-- Icon circle -->
        <div style="
          width: 88px; height: 88px; border-radius: 50%;
          background: linear-gradient(135deg, #1e3a5f, #2d1b69);
          border: 1px solid rgba(255,255,255,0.1);
          display: flex; align-items: center; justify-content: center;
          animation: float 4s ease-in-out infinite;
          position: relative; z-index: 2;
          box-shadow: 0 0 40px rgba(59,130,246,0.3);
        ">
          <!-- Gear SVG -->
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
            style="animation: spin-slow 6s linear infinite;">
            <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.33-1.82a.554.554 0 0 0 .13-.71l-2.21-3.83a.554.554 0 0 0-.68-.22l-2.75 1.1a8.1 8.1 0 0 0-1.86-1.08L14 2.42A.537.537 0 0 0 13.45 2h-4.4c-.27 0-.5.18-.54.42l-.41 2.93a8.1 8.1 0 0 0-1.86 1.08L3.49 5.35a.554.554 0 0 0-.68.22L.6 9.4c-.14.24-.09.54.13.71l2.33 1.82C3.03 12.26 3 12.63 3 13s.03.74.07 1.08L.74 15.9a.554.554 0 0 0-.13.71l2.21 3.83c.14.24.44.32.68.22l2.75-1.1c.59.43 1.21.79 1.86 1.08l.41 2.93c.04.24.27.42.54.42h4.4c.27 0 .5-.18.54-.42l.41-2.93a8.1 8.1 0 0 0 1.86-1.08l2.75 1.1c.24.1.54.02.68-.22l2.21-3.83a.554.554 0 0 0-.13-.71l-2.33-1.82z"
              fill="url(#gearGrad)"/>
            <defs>
              <linearGradient id="gearGrad" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#60a5fa"/>
                <stop offset="100%" stop-color="#a78bfa"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>

      <!-- Heading -->
      <h1 style="
        font-family: 'Syne', sans-serif;
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #f1f5f9;
        margin-bottom: 12px;
        line-height: 1.1;
      ">
        We'll Be Back Soon
      </h1>

      <!-- Sub-heading badge -->
      <div style="
        display: inline-flex; align-items: center; gap: 8px;
        background: rgba(59,130,246,0.12);
        border: 1px solid rgba(59,130,246,0.25);
        border-radius: 99px;
        padding: 6px 16px;
        font-size: 0.8rem;
        color: #93c5fd;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 24px;
      ">
        <span style="
          width: 6px; height: 6px; border-radius: 50%;
          background: #3b82f6;
          animation: blink 1.2s ease-in-out infinite;
          display: inline-block;
        "></span>
        Scheduled Maintenance
      </div>

      <!-- Description -->
      <p style="
        font-size: 1rem;
        line-height: 1.7;
        color: rgba(226,232,240,0.6);
        max-width: 420px;
        margin: 0 auto 36px;
        font-weight: 300;
      ">
        We're performing some scheduled upgrades to improve your experience.
        Everything will be back online shortly — thanks for your patience.
      </p>

      <!-- Progress bar -->
      <div style="margin-bottom: 36px;">
        <div style="
          display: flex; justify-content: space-between;
          font-size: 0.78rem; color: rgba(255,255,255,0.35);
          margin-bottom: 8px;
          font-weight: 500;
        ">
          <span>Progress</span>
          <span>~78%</span>
        </div>
        <div style="
          width: 100%; height: 6px;
          background: rgba(255,255,255,0.07);
          border-radius: 99px; overflow: hidden;
        ">
          <div style="
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 99px;
            animation: bar 2.5s cubic-bezier(0.4,0,0.2,1) forwards;
            box-shadow: 0 0 12px rgba(59,130,246,0.5);
          "></div>
        </div>
      </div>

      <!-- Divider -->
      <div style="
        height: 1px;
        background: rgba(255,255,255,0.06);
        margin-bottom: 28px;
      "></div>

      <!-- Contact row -->
      <p style="font-size: 0.875rem; color: rgba(255,255,255,0.35); margin-bottom: 14px;">
        Need urgent help? Reach us at
      </p>
      <a href="mailto:support@shelternigeria.org" style="
        display: inline-flex; align-items: center; gap: 8px;
        color: #93c5fd;
        font-size: 0.95rem;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      "
        onmouseover="this.style.color='#bfdbfe'"
        onmouseout="this.style.color='#93c5fd'"
      >
        <!-- Email icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/>
        </svg>
        info@blueoakcapitals.com
      </a>
    </div>

    <!-- Bottom accent -->
    <div style="
      height: 4px;
      background: linear-gradient(90deg, #ec4899, #8b5cf6, #3b82f6);
      opacity: 0.5;
    "></div>
  </div>

</body>
</html>
